<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Login</title>

<style>
/* ===== Theme Variables ===== */
:root {
  --bg-gradient: linear-gradient(135deg, #f5f7fa, #c3cfe2);
  --text-color: #222;
  --card-bg: rgba(255,255,255,0.9);
  --footer-bg: #dddddd;
  --button-gradient: linear-gradient(90deg, #4facfe, #00f2fe);
}

[data-theme="dark"] {
  --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  --text-color: #f5f5f5;
  --card-bg: rgba(255,255,255,0.08);
  --footer-bg: #2c3e50;
  --button-gradient: linear-gradient(90deg, #00c6ff, #0072ff);
}

/* ===== Body ===== */
body{
  font-family:"Times New Roman", Times, serif;
  background: var(--bg-gradient);
  color:var(--text-color);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  transition:0.3s ease;
}

/* ===== Login Box ===== */
.login-box{
  background: var(--card-bg);
  padding:50px 40px;
  border-radius:20px;
  text-align:center;
  backdrop-filter: blur(15px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  width:320px;
  transition:0.3s ease;
}

.login-box h2{
  font-size:28px;
  margin-bottom:25px;
}

/* ===== Inputs ===== */
input{
  margin:12px 0;
  padding:12px;
  width:100%;
  border-radius:10px;
  border:none;
  font-size:14px;
  outline:none;
}

input:focus{
  box-shadow:0 0 8px #00f2fe;
}

/* ===== Buttons ===== */
button{
  padding:12px 25px;
  margin-top:15px;
  border:none;
  border-radius:25px;
  background: var(--button-gradient);
  color:white;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

/* ===== Toggle Button ===== */
.theme-toggle{
  position:fixed;
  top:20px;
  right:20px;
  padding:8px 15px;
  border-radius:20px;
  font-size:14px;
}

/* ===== Footer ===== */
footer{
  width:100%;
  text-align:center;
  padding:15px;
  background-color:var(--footer-bg);
  position:fixed;
  bottom:0;
  left:0;
  transition:0.3s ease;
}
</style>
</head>

<body>

<!-- Theme Toggle -->
<button class="theme-toggle" onclick="toggleTheme()">☀/🌙 Mode</button>

<div class="login-box">
<h2>Doctor Login</h2>
<input type="text" id="user" placeholder="Username"><br>
<input type="password" id="pass" placeholder="Password"><br>
<button onclick="login()">Login</button>
<br>
<button class="back-btn" onclick="window.location.href='index.html'"> Back </button>
</div>

<script>
const API="http://127.0.0.1:8000";

/* Login Function */
async function login(){
  const username=document.getElementById("user").value;
  const password=document.getElementById("pass").value;

  const res=await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,password})
  });

  if(res.status!==200){
    alert("Invalid login");
    return;
  }

  const data=await res.json();
  localStorage.setItem("token", data.token);
  localStorage.setItem("user", username);

  window.location.href="dashboard.html";
}

/* Theme Toggle */
function toggleTheme(){
  const currentTheme=document.documentElement.getAttribute("data-theme");
  const newTheme=currentTheme==="dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", newTheme);
  localStorage.setItem("theme", newTheme);
}

/* Load Saved Theme */
const savedTheme=localStorage.getItem("theme") || "dark";
document.documentElement.setAttribute("data-theme", savedTheme);
</script>

<footer>
    &copy; 2026 Diagnosis System | All Rights Reserved
</footer>

</body>
</html>
