<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Dashboard</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ================= THEME VARIABLES ================= */
:root {
    --bg-gradient: linear-gradient(135deg, #f5f7fa, #c3cfe2);
    --card-bg: #ffffff;
    --text-color: #222;
    --accent-color: #0072ff;
    --button-gradient: linear-gradient(90deg, #4facfe, #00f2fe);
}

[data-theme="dark"] {
    --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    --card-bg: #1e2a33;
    --text-color: #f5f5f5;
    --accent-color: #00c6ff;
    --button-gradient: linear-gradient(90deg, #00c6ff, #0072ff);
}

/* ================= GLOBAL ================= */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg-gradient);
    color: var(--text-color);
    padding: 20px;
}

h2 {
    text-align: center;
}

.container {
    max-width: 1200px;
    margin: auto;
}

/* ================= HEADER ================= */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.theme-btn {
    padding: 8px 15px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: var(--button-gradient);
    color: white;
}

/* ================= BUTTON PANEL ================= */
.actions {
    text-align: center;
    margin: 20px 0;
}

.actions button {
    padding: 10px 20px;
    margin: 8px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
    background: var(--button-gradient);
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.actions button:hover {
    transform: translateY(-2px);
}

/* ================= CARDS ================= */
.card {
    background: var(--card-bg);
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
}

/* ================= PATIENT LIST ================= */
.patient-item {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    border-bottom: 1px solid #4443;
}

.patient-item button {
    padding: 6px 12px;
    border-radius: 15px;
    border: none;
    background: var(--accent-color);
    color: white;
    cursor: pointer;
}

/* ================= CHART ================= */
.chart-container {
    height: 400px;
}

/* ================= FOOTER ================= */
footer {
    text-align: center;
    margin-top: 30px;
    opacity: 0.7;
}

/* ================= RESPONSIVE ================= */
@media (max-width: 600px) {
    .actions button {
        width: 100%;
        margin: 6px 0;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <h2>Welcome Dr. <span id="doctorName"></span></h2>
        <button class="theme-btn" onclick="toggleTheme()">☀/🌙 Mode</button>
    </div>

    <!-- Action Buttons -->
    <div class="actions">
        <button onclick="goUpload()">Diagnose</button>
        <button onclick="gonew_patient()">New Patient</button>
       <button onclick="gopatient_history()">Patient History</button>
        <button onclick="goabout()">About</button>
        <button onclick="gosetting()">Settings</button>
        <button onclick="gorules()">Terms</button>
        <button onclick="logout()">Logout</button>
    </div>

    <!-- Patient Profiles -->
    <div class="card">
        <h3>Patient Profiles</h3>
        <div id="patientList">
            <!-- Patients will load here -->
        </div>
    </div>

    <!-- Analytics -->
    <div class="card">
        <h3>Analytics</h3>
        <div class="chart-container">
            <canvas id="chart"></canvas>
        </div>
    </div>

    <footer>
        © 2026 Diagnosis System | All Rights Reserved
    </footer>

</div>

<!-- External JS -->
<script src="js/dashboard.js"></script>

</body>
</html>
